<style>
        body {
            background-color: #0A0A0A;
            color: #e5e2e1;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {

        }
        .custom-scrollbar::-webkit-scrollbar-thumb {

            border-radius: 2px;
        }

<body class="h-screen overflow-hidden flex-col">
<!-- Left Sidebar -->
<!-- Main Content Area -->
<main class="flex flex-col relative h-full bg-[#0A0A0A]">
<!-- Header / Top Bar -->
<!-- Message Thread Canvas -->
<div class="flex-1 overflow-y-auto custom-scrollbar pt-8 pb-40"><div class="flex flex-col items-center justify-center min-h-full py-20"><h1 class="font-headline-xl text-headline-xl text-primary mb-2">MedInsight</h1><p class="text-on-surface-variant font-body-md">Intelligent clinical research assistant</p></div></div>
<!-- Sticky Search / Input Area -->
<div class="absolute bottom-0 left-0 right-0 p-8 pointer-events-none">
<div class="max-w-3xl mx-auto w-full pointer-events-auto">
<div class="bg-[#141414] border border-outline-variant rounded-xl shadow-2xl p-4 transition-all focus-within:border-primary focus-within:ring-1 focus-within:ring-primary/20">
<div class="flex items-start gap-3">
<textarea class="w-full bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-on-surface-variant/40 font-body-md text-body-md py-2 resize-none custom-scrollbar" placeholder="Ask MedInsight clinical research questions..." rows="1"></textarea>
<button class="bg-primary hover:bg-primary-fixed-dim text-on-primary font-bold px-6 py-2 rounded-lg transition-all active:scale-95 flex items-center gap-2">
<span class="font-label-caps text-label-caps">SEARCH</span>
<span class="material-symbols-outlined text-[20px]">arrow_upward</span>
</button>
</div>
<div class="mt-4 flex items-center justify-between border-t border-outline-variant/30 pt-3">
<div class="flex items-center gap-3">
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-9 h-5 bg-surface-container-high peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"></div>
<span class="ml-2 font-label-caps text-label-caps text-on-surface-variant">PRO MODE</span>
</label>
</div>
</div>
</div>
<p class="text-center mt-3 text-[10px] text-on-surface-variant/50 uppercase tracking-widest">MedInsight AI utilizes verified peer-reviewed data. Verify critical clinical findings.</p>
</div>
</div>
</main>
<!-- Right Utility Panel (Asymmetric touch) -->
<script>
        // Micro-interaction for the textarea auto-expand
        const textarea = document.querySelector('textarea');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if (this.scrollHeight > 200) {
                this.style.overflowY = 'auto';
                this.style.height = '200px';
            } else {
                this.style.overflowY = 'hidden';
            }
        });

        // Navigation state switching logic (Visual only)
        const navItems = document.querySelectorAll('nav a');
        navItems.forEach(item => {
            item.addEventListener('click', (e) => {
                navItems.forEach(i => {
                    i.classList.remove('active-nav-item');
                    i.classList.add('text-on-surface-variant');
                });
                item.classList.add('active-nav-item');
                item.classList.remove('text-on-surface-variant');
            });
        });
    </script>
</body></html>
